<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#93c5fd;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer decorative ring -->
  <circle cx="50" cy="50" r="47" fill="none" stroke="url(#accentGradient)" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Main background circle with gradient -->
  <circle cx="50" cy="50" r="42" fill="url(#logoGradient)"/>
  
  <!-- Inner highlight ring -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="white" stroke-width="0.5" opacity="0.2"/>
  
  <!-- Stylized 'N' letterform -->
  <g filter="url(#glow)">
    <path d="M 28 70 L 28 30 L 35 30 L 50 55 L 50 30 L 57 30 L 57 70 L 50 70 L 35 45 L 35 70 Z" 
          fill="white" opacity="0.95"/>
  </g>
  
  <!-- Stylized 'A' letterform (smaller, positioned elegantly) -->
  <g filter="url(#glow)">
    <path d="M 60 70 L 66 30 L 76 30 L 82 70 L 75 70 L 74 60 L 68 60 L 67 70 Z M 69 54 L 73 54 L 71 40 Z" 
          fill="url(#accentGradient)" opacity="0.95"/>
  </g>
  
  <!-- Small upward arrow (growth/success indicator) -->
  <path d="M 85 25 L 90 20 L 95 25 M 90 20 L 90 35" 
        stroke="url(#accentGradient)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  
  <!-- Small decorative dot -->
  <circle cx="22" cy="22" r="3" fill="url(#accentGradient)" opacity="0.7"/>
</svg>
